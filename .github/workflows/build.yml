name: Android Build & Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-utility-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -z "$KEYSTORE_FILE" ]; then
            echo "Warning: KEYSTORE_FILE secret is not set, generating a temporary keystore..."
            keytool -genkey -v -keystore keystore.jks -alias temp_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "temppass" -keypass "temppass" -dname "CN=Azure, OU=Azure, O=Azure, L=Azure, S=Azure, C=Azure"
          else
            echo "$KEYSTORE_FILE" | base64 --decode > keystore.jks
          fi

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PATH: "keystore.jks"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'temppass' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'temp_alias' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'temppass' }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-utility-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
